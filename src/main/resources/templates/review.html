<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${movie.title} + ' - Cuit影评'">电影详情 - Cuit影评</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-glass: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #606070;
            --accent-gold: #d4a853;
            --accent-gold-hover: #e8bc6a;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(212, 168, 83, 0.3);
            --shadow-gold: rgba(212, 168, 83, 0.15);
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: linear-gradient(180deg, rgba(10, 10, 15, 0.95) 0%, rgba(10, 10, 15, 0.8) 100%);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            padding: 0 5%;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--accent-gold);
            text-decoration: none;
            letter-spacing: 2px;
        }

        .logo span {
            color: var(--text-primary);
        }

        .nav-links {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 15px;
            font-weight: 400;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-links a:hover {
            color: var(--text-primary);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-gold);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            padding: 10px 24px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
        }

        .btn-outline:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            background: rgba(212, 168, 83, 0.05);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-gold) 0%, #b8941d 100%);
            color: #0a0a0f;
            font-weight: 600;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px var(--shadow-gold);
        }

        /* 用户菜单 */
        .user-menu {
            position: relative;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-gold) 0%, #b8941d 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 600;
            color: #0a0a0f;
            transition: all 0.3s ease;
        }

        .user-avatar:hover {
            box-shadow: 0 0 20px var(--shadow-gold);
        }

        .dropdown-menu {
            position: absolute;
            top: 55px;
            right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 10px 0;
            min-width: 180px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .dropdown-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-menu a {
            display: block;
            padding: 12px 20px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .dropdown-menu a:hover {
            background: var(--bg-glass);
            color: var(--text-primary);
        }

        .dropdown-divider {
            height: 1px;
            background: var(--border-subtle);
            margin: 8px 0;
        }

        /* 主内容区 */
        .main-content {
            padding-top: 100px;
            min-height: 100vh;
        }

        /* 电影详情头部 */
        .movie-hero {
            position: relative;
            padding: 60px 5%;
            background: linear-gradient(180deg, rgba(212, 168, 83, 0.05) 0%, transparent 100%);
            border-bottom: 1px solid var(--border-subtle);
        }

        .movie-hero-content {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 60px;
            align-items: start;
        }

        .movie-poster {
            position: relative;
        }

        .movie-poster img {
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
        }

        .movie-rating-badge {
            position: absolute;
            top: -15px;
            right: -15px;
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--accent-gold) 0%, #b8941d 100%);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px var(--shadow-gold);
        }

        .movie-rating-badge .score {
            font-size: 24px;
            font-weight: 700;
            color: #0a0a0f;
        }

        .movie-rating-badge .label {
            font-size: 11px;
            color: #0a0a0f;
            font-weight: 600;
        }

        .movie-info h1 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 600;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffffff 0%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .movie-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 15px;
        }

        .meta-tag {
            padding: 6px 14px;
            background: var(--bg-glass);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .movie-description {
            font-size: 16px;
            line-height: 1.8;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .movie-actions {
            display: flex;
            gap: 15px;
        }

        .btn-large {
            padding: 14px 32px;
            font-size: 16px;
        }

        /* 评论区 */
        .reviews-section {
            padding: 60px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 28px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .review-count {
            padding: 6px 14px;
            background: var(--bg-glass);
            border-radius: 20px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .reviews-list {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .review-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 30px;
            transition: all 0.3s ease;
        }

        .review-card:hover {
            border-color: var(--border-glow);
            transform: translateY(-3px);
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .reviewer {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .reviewer-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
        }

        .reviewer-info h4 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .reviewer-info .review-date {
            font-size: 13px;
            color: var(--text-muted);
        }

        .review-score {
            background: rgba(212, 168, 83, 0.15);
            border: 1px solid var(--border-glow);
            padding: 8px 16px;
            border-radius: 25px;
            color: var(--accent-gold);
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .review-content {
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.8;
        }

        .review-footer {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-subtle);
        }

        .review-action {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: none;
            border: none;
        }

        .review-action:hover {
            color: var(--accent-gold);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
        }

        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: 15px;
        }

        /* 页脚 */
        .footer {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-subtle);
            padding: 40px 5%;
            margin-top: 80px;
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--accent-gold);
        }

        .footer-logo span {
            color: var(--text-primary);
        }

        .footer-links {
            display: flex;
            gap: 30px;
        }

        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: var(--accent-gold);
        }

        .footer-copyright {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .nav-links {
                display: none;
            }

            .movie-hero-content {
                grid-template-columns: 250px 1fr;
                gap: 40px;
            }

            .movie-info h1 {
                font-size: 36px;
            }
        }

        @media (max-width: 768px) {
            .movie-hero {
                padding: 40px 5%;
            }

            .movie-hero-content {
                grid-template-columns: 1fr;
            }

            .movie-poster {
                max-width: 250px;
                margin: 0 auto;
            }

            .movie-info h1 {
                font-size: 28px;
                text-align: center;
            }

            .movie-meta {
                justify-content: center;
            }

            .movie-description {
                text-align: center;
            }

            .movie-actions {
                justify-content: center;
            }

            .section-header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .footer-content {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">Cuit<span>影评</span></a>
            <div class="nav-links">
                <a th:href="@{/movielist(userId=${user.userId})}">电影</a>
                <a th:href="@{/reviews(userId=${user.userId})}">评论</a>
                <a href="#">社区</a>
            </div>
            <div class="nav-actions">
                <div class="user-menu">
                    <div class="user-avatar" onclick="toggleDropdown()" th:text="${user.username.substring(0,1).toUpperCase()}">U</div>
                    <div class="dropdown-menu" id="userDropdown">
                        <a th:href="@{/movielist(userId=${user.userId})}">电影列表</a>
                        <a th:href="@{/reviews(userId=${user.userId})}">评论列表</a>
                        <div class="dropdown-divider"></div>
                        <a href="/logout">退出登录</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
        <!-- 电影详情 -->
        <section class="movie-hero">
            <div class="movie-hero-content">
                <div class="movie-poster">
                    <img th:src="${movie.posterImage}" alt="Movie Poster">
                    <div class="movie-rating-badge">
                        <span class="score" th:text="${movie.averageScore}">9.0</span>
                        <span class="label">评分</span>
                    </div>
                </div>
                <div class="movie-info">
                    <h1 th:text="${movie.title}">电影标题</h1>
                    <div class="movie-meta">
                        <span class="meta-item" th:text="${movie.releaseDate}">2024</span>
                        <span class="meta-item" th:text="${movie.runtime + ' 分钟'}">120 分钟</span>
                        <span class="meta-tag" th:text="${movie.genre}">剧情</span>
                    </div>
                    <p class="movie-description" th:text="${movie.description}">电影简介...</p>
                    <div class="movie-actions">
                        <a class="btn btn-primary btn-large" th:href="@{/addreview(movieId=${movie.movieId},userId=${user.userId})}">
                            ✍️ 写影评
                        </a>
                        <button class="btn btn-outline btn-large">❤️ 收藏</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 评论区 -->
        <section class="reviews-section">
            <div class="section-header">
                <h2 class="section-title">
                    影评
                    <span class="review-count" th:text="${reviews != null ? reviews.size() : 0} + ' 条评论'">0 条评论</span>
                </h2>
            </div>

            <div class="reviews-list" th:if="${reviews != null and !reviews.isEmpty()}">
                <div class="review-card" th:each="review : ${reviews}">
                    <div class="review-header">
                        <div class="reviewer">
                            <div class="reviewer-avatar" th:text="${review.username.substring(0,1).toUpperCase()}">U</div>
                            <div class="reviewer-info">
                                <h4 th:text="${review.username}">用户名</h4>
                                <span class="review-date" th:text="${#dates.format(review.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</span>
                            </div>
                        </div>
                        <div class="review-score">
                            <span>★</span>
                            <span th:text="${review.score}">9.0</span>
                        </div>
                    </div>
                    <p class="review-content" th:text="${review.content}">评论内容...</p>
                    <div class="review-footer">
                        <button class="review-action">
                            <span>👍</span>
                            <span>有用</span>
                        </button>
                        <button class="review-action">
                            <span>💬</span>
                            <span>回复</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 空状态 -->
            <div class="empty-state" th:if="${reviews == null or reviews.isEmpty()}">
                <div class="empty-state-icon">✍️</div>
                <h3>暂无评论</h3>
                <p>成为第一个评论这部电影的人吧！</p>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-logo">Cuit<span>影评</span></div>
            <div class="footer-links">
                <a href="/">首页</a>
                <a href="/movielist">电影</a>
                <a href="/reviews">评论</a>
                <a href="#">关于</a>
            </div>
            <div class="footer-copyright">© 2024 Cuit影评. All rights reserved.</div>
        </div>
    </footer>

    <script>
        function toggleDropdown() {
            document.getElementById('userDropdown').classList.toggle('active');
        }

        document.addEventListener('click', function(e) {
            const userMenu = document.querySelector('.user-menu');
            if (!userMenu.contains(e.target)) {
                document.getElementById('userDropdown').classList.remove('active');
            }
        });
    </script>
</body>
</html>
