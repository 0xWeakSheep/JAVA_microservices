
<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评论列表 - Cuit影评</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-glass: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #606070;
            --accent-gold: #d4a853;
            --accent-gold-hover: #e8bc6a;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(212, 168, 83, 0.3);
            --shadow-gold: rgba(212, 168, 83, 0.15);
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: linear-gradient(180deg, rgba(10, 10, 15, 0.95) 0%, rgba(10, 10, 15, 0.8) 100%);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            padding: 0 5%;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--accent-gold);
            text-decoration: none;
            letter-spacing: 2px;
        }

        .logo span {
            color: var(--text-primary);
        }

        .nav-links {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 15px;
            font-weight: 400;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-links a:hover {
            color: var(--text-primary);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-gold);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a.active {
            color: var(--accent-gold);
        }

        .nav-links a.active::after {
            width: 100%;
        }

        .nav-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            padding: 10px 24px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
        }

        .btn-outline:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            background: rgba(212, 168, 83, 0.05);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-gold) 0%, #b8941d 100%);
            color: #0a0a0f;
            font-weight: 600;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px var(--shadow-gold);
        }

        /* 用户菜单 */
        .user-menu {
            position: relative;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-gold) 0%, #b8941d 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 600;
            color: #0a0a0f;
            transition: all 0.3s ease;
        }

        .user-avatar:hover {
            box-shadow: 0 0 20px var(--shadow-gold);
        }

        .dropdown-menu {
            position: absolute;
            top: 55px;
            right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 10px 0;
            min-width: 180px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .dropdown-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-menu a {
            display: block;
            padding: 12px 20px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .dropdown-menu a:hover {
            background: var(--bg-glass);
            color: var(--text-primary);
        }

        .dropdown-divider {
            height: 1px;
            background: var(--border-subtle);
            margin: 8px 0;
        }

        /* 主内容区 */
        .main-content {
            padding-top: 100px;
            min-height: 100vh;
        }

        /* 页面头部 */
        .page-header {
            background: linear-gradient(180deg, rgba(212, 168, 83, 0.1) 0%, transparent 100%);
            padding: 60px 5%;
            border-bottom: 1px solid var(--border-subtle);
        }

        .page-header-content {
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 600;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #ffffff 0%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 18px;
        }

        /* 筛选区 */
        .filter-section {
            padding: 25px 5%;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-subtle);
        }

        .filter-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .filter-tabs {
            display: flex;
            gap: 5px;
        }

        .filter-tab {
            padding: 10px 24px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 14px;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .filter-tab:hover {
            color: var(--text-secondary);
        }

        .filter-tab.active {
            background: var(--bg-glass);
            color: var(--accent-gold);
        }

        .sort-select {
            padding: 10px 20px;
            background: var(--bg-glass);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .sort-select:focus {
            outline: none;
            border-color: var(--accent-gold);
        }

        /* 评论列表 */
        .reviews-section {
            padding: 60px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 30px;
        }

        .review-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 30px;
            transition: all 0.4s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .review-card:hover {
            transform: translateY(-8px);
            border-color: var(--border-glow);
            box-shadow:
                0 30px 60px rgba(0, 0, 0, 0.4),
                0 0 30px var(--shadow-gold);
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 25px;
        }

        .reviewer {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .reviewer-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
        }

        .reviewer-info h4 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .reviewer-info .review-time {
            font-size: 13px;
            color: var(--text-muted);
        }

        .review-score {
            background: rgba(212, 168, 83, 0.15);
            border: 1px solid var(--border-glow);
            padding: 8px 16px;
            border-radius: 25px;
            color: var(--accent-gold);
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .review-movie {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: var(--bg-glass);
            border-radius: 12px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .review-card:hover .review-movie {
            background: rgba(212, 168, 83, 0.1);
        }

        .movie-poster-small {
            width: 50px;
            height: 70px;
            border-radius: 8px;
            object-fit: cover;
        }

        .movie-details h5 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .movie-details span {
            font-size: 13px;
            color: var(--text-muted);
        }

        .review-content {
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.8;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .review-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 1px solid var(--border-subtle);
        }

        .review-actions {
            display: flex;
            gap: 20px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: none;
            border: none;
        }

        .action-btn:hover {
            color: var(--accent-gold);
        }

        .action-btn.liked {
            color: var(--accent-gold);
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 60px;
        }

        .page-btn {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            background: var(--bg-glass);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-btn:hover,
        .page-btn.active {
            background: var(--accent-gold);
            color: #0a0a0f;
            border-color: var(--accent-gold);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 100px 20px;
        }

        .empty-state-icon {
            font-size: 80px;
            margin-bottom: 30px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: 16px;
        }

        /* 页脚 */
        .footer {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-subtle);
            padding: 40px 5%;
            margin-top: 80px;
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--accent-gold);
        }

        .footer-logo span {
            color: var(--text-primary);
        }

        .footer-links {
            display: flex;
            gap: 30px;
        }

        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: var(--accent-gold);
        }

        .footer-copyright {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .nav-links {
                display: none;
            }

            .page-title {
                font-size: 36px;
            }

            .reviews-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .page-header {
                padding: 40px 5%;
            }

            .page-title {
                font-size: 28px;
            }

            .filter-content {
                flex-direction: column;
                align-items: stretch;
            }

            .filter-tabs {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .reviews-grid {
                grid-template-columns: 1fr;
            }

            .review-header {
                flex-direction: column;
                gap: 15px;
            }

            .footer-content {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }

            .footer-links {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">Cuit<span>影评</span></a>
            <div class="nav-links">
                <a href="/">首页</a>
                <a th:href="@{/movielist(userId=${user.userId})}">电影</a>
                <a href="/reviews" class="active">评论</a>
                <a href="#">社区</a>
            </div>
            <div class="nav-actions">
                <div class="user-menu">
                    <div class="user-avatar" onclick="toggleDropdown()" th:text="${user.username.substring(0,1).toUpperCase()}">U</div>
                    <div class="dropdown-menu" id="userDropdown">
                        <a th:href="@{/movielist(userId=${user.userId})}">电影列表</a>
                        <a th:href="@{/reviews(userId=${user.userId})}">评论列表</a>
                        <div class="dropdown-divider"></div>
                        <a href="/logout">退出登录</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
        <!-- 页面头部 -->
        <div class="page-header">
            <div class="page-header-content">
                <h1 class="page-title">最新评论</h1>
                <p class="page-subtitle">发现精彩影评，分享观影心得</p>
            </div>
        </div>

        <!-- 筛选 -->
        <div class="filter-section">
            <div class="filter-content">
                <div class="filter-tabs">
                    <button class="filter-tab active">全部</button>
                    <button class="filter-tab">热门</button>
                    <button class="filter-tab">最新</button>
                    <button class="filter-tab">好评</button>
                    <button class="filter-tab">长评</button>
                </div>
                <select class="sort-select">
                    <option>按时间排序</option>
                    <option>按热度排序</option>
                    <option>按评分排序</option>
                </select>
            </div>
        </div>

        <!-- 评论列表 -->
        <section class="reviews-section">
            <div class="reviews-grid" th:if="${reviews != null and !reviews.isEmpty()}">
                <a class="review-card" th:each="review : ${reviews}" th:href="@{/getmovie(movieId=${review.movieId},userId=${user.userId})}">
                    <div class="review-header">
                        <div class="reviewer">
                            <div class="reviewer-avatar" th:text="${review.username.substring(0,1).toUpperCase()}">U</div>
                            <div class="reviewer-info">
                                <h4 th:text="${review.username}">用户名</h4>
                                <span class="review-time" th:text="${#dates.format(review.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</span>
                            </div>
                        </div>
                        <div class="review-score">
                            <span>★</span>
                            <span th:text="${review.score}">9.0</span>
                        </div>
                    </div>
                    <div class="review-movie">
                        <div class="movie-details">
                            <h5 th:text="${review.title}">电影标题</h5>
                            <span>点击跳转电影详情</span>
                        </div>
                    </div>
                    <p class="review-content" th:text="${review.content}">评论内容...</p>
                    <div class="review-footer">
                        <div class="review-actions">
                            <button class="action-btn">
                                <span>👍</span>
                                <span>点赞</span>
                            </button>
                            <button class="action-btn">
                                <span>💬</span>
                                <span>回复</span>
                            </button>
                        </div>
                    </div>
                </a>
            </div>

            <!-- 空状态 -->
            <div class="empty-state" th:if="${reviews == null or reviews.isEmpty()}">
                <div class="empty-state-icon">✍️</div>
                <h3>暂无评论</h3>
                <p>成为第一个评论的人吧！</p>
            </div>

            <!-- 分页 -->
            <div class="pagination" th:if="${reviews != null and !reviews.isEmpty()}">
                <button class="page-btn">←</button>
                <button class="page-btn active">1</button>
                <button class="page-btn">2</button>
                <button class="page-btn">3</button>
                <span style="color: var(--text-muted); padding: 10px;">...</span>
                <button class="page-btn">→</button>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-logo">Cuit<span>影评</span></div>
            <div class="footer-links">
                <a href="/">首页</a>
                <a href="/movielist">电影</a>
                <a href="/reviews">评论</a>
                <a href="#">关于</a>
            </div>
            <div class="footer-copyright">© 2024 Cuit影评. All rights reserved.</div>
        </div>
    </footer>

    <script>
        function toggleDropdown() {
            document.getElementById('userDropdown').classList.toggle('active');
        }

        document.addEventListener('click', function(e) {
            const userMenu = document.querySelector('.user-menu');
            if (!userMenu.contains(e.target)) {
                document.getElementById('userDropdown').classList.remove('active');
            }
        });

        // 筛选标签切换
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // 点赞功能
        document.querySelectorAll('.action-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                this.classList.toggle('liked');
            });
        });
    </script>
</body>
</html>
