
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - Cuit影评</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-glass: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #606070;
            --accent-gold: #d4a853;
            --accent-gold-hover: #e8bc6a;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(212, 168, 83, 0.3);
            --shadow-gold: rgba(212, 168, 83, 0.15);
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 背景装饰 */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-decoration::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(212, 168, 83, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.05) 0%, transparent 40%),
                radial-gradient(ellipse at 50% 100%, rgba(212, 168, 83, 0.05) 0%, transparent 50%);
            animation: bgMove 20s ease-in-out infinite;
        }

        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-2%, 2%) rotate(180deg); }
        }

        /* 注册容器 */
        .register-container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 480px;
            padding: 60px 50px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            box-shadow:
                0 40px 80px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(212, 168, 83, 0.1);
        }

        .register-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 600;
            color: var(--accent-gold);
            text-decoration: none;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: inline-block;
        }

        .logo span {
            color: var(--text-primary);
        }

        .register-header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .register-header p {
            color: var(--text-muted);
            font-size: 15px;
        }

        /* 表单 */
        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            background: var(--bg-glass);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px var(--shadow-gold);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        /* 密码强度 */
        .password-strength {
            margin-top: 10px;
        }

        .strength-bar {
            height: 4px;
            background: var(--bg-glass);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .strength-fill {
            height: 100%;
            width: 0;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .strength-fill.weak {
            width: 33%;
            background: #ef4444;
        }

        .strength-fill.medium {
            width: 66%;
            background: #f59e0b;
        }

        .strength-fill.strong {
            width: 100%;
            background: #22c55e;
        }

        .strength-text {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* 条款 */
        .terms {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 30px;
        }

        .terms input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            accent-color: var(--accent-gold);
            cursor: pointer;
        }

        .terms label {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
        }

        .terms a {
            color: var(--accent-gold);
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        /* 按钮 */
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-gold) 0%, #b8941d 100%);
            color: #0a0a0f;
            margin-bottom: 20px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px var(--shadow-gold);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 分隔线 */
        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-subtle);
        }

        .divider span {
            padding: 0 15px;
        }

        /* 社交登录 */
        .social-login {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            background: var(--bg-glass);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .social-btn:hover {
            border-color: var(--border-glow);
            color: var(--text-primary);
        }

        /* 登录链接 */
        .login-link {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }

        .login-link a {
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* 返回首页 */
        .back-home {
            position: absolute;
            top: 30px;
            left: 30px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .back-home:hover {
            color: var(--accent-gold);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .register-container {
                padding: 40px 30px;
            }

            .logo {
                font-size: 28px;
            }

            .register-header h1 {
                font-size: 24px;
            }

            .back-home {
                top: 20px;
                left: 20px;
            }
        }

        /* 错误提示 */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="bg-decoration"></div>

    <a href="/" class="back-home">
        <span>←</span>
        <span>返回首页</span>
    </a>

    <div class="register-container">
        <div class="register-header">
            <a href="/" class="logo">Cuit<span>影评</span></a>
            <h1>创建账号</h1>
            <p>加入我们的电影社区，开启你的影评之旅</p>
        </div>

        <form action="/regist1" method="POST">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="设置一个用户名" required>
            </div>

            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" name="email" placeholder="输入你的邮箱地址" required>
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="设置密码（至少6位）" required minlength="6">
                <div class="password-strength">
                    <div class="strength-bar">
                        <div class="strength-fill" id="strengthFill"></div>
                    </div>
                    <span class="strength-text" id="strengthText">密码强度</span>
                </div>
            </div>

            <div class="terms">
                <input type="checkbox" id="agree" name="agree" required>
                <label for="agree">
                    我已阅读并同意<a href="#">服务条款</a>和<a href="#">隐私政策</a>
                </label>
            </div>

            <button type="submit" class="btn btn-primary">注册</button>
        </form>

        <div class="divider">
            <span>或使用以下方式</span>
        </div>

        <div class="social-login">
            <button class="social-btn">
                <span>W</span>
                <span>微信</span>
            </button>
            <button class="social-btn">
                <span>Q</span>
                <span>QQ</span>
            </button>
        </div>

        <div class="login-link">
            已有账号？<a href="/login">立即登录</a>
        </div>
    </div>

    <script>
        // 密码强度检测
        const passwordInput = document.getElementById('password');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');

        passwordInput.addEventListener('input', function() {
            const password = this.value;
            let strength = 0;

            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            strengthFill.className = 'strength-fill';

            if (password.length === 0) {
                strengthText.textContent = '密码强度';
            } else if (strength <= 2) {
                strengthFill.classList.add('weak');
                strengthText.textContent = '密码强度：弱';
                strengthText.style.color = '#ef4444';
            } else if (strength <= 4) {
                strengthFill.classList.add('medium');
                strengthText.textContent = '密码强度：中';
                strengthText.style.color = '#f59e0b';
            } else {
                strengthFill.classList.add('strong');
                strengthText.textContent = '密码强度：强';
                strengthText.style.color = '#22c55e';
            }
        });
    </script>
</body>
</html>
