<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电影列表 - Cuit影评</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-glass: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #606070;
            --accent-gold: #d4a853;
            --accent-gold-hover: #e8bc6a;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(212, 168, 83, 0.3);
            --shadow-gold: rgba(212, 168, 83, 0.15);
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: linear-gradient(180deg, rgba(10, 10, 15, 0.95) 0%, rgba(10, 10, 15, 0.8) 100%);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            padding: 0 5%;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--accent-gold);
            text-decoration: none;
            letter-spacing: 2px;
        }

        .logo span {
            color: var(--text-primary);
        }

        .nav-links {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 15px;
            font-weight: 400;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-links a:hover {
            color: var(--text-primary);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-gold);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a.active {
            color: var(--accent-gold);
        }

        .nav-links a.active::after {
            width: 100%;
        }

        .nav-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            padding: 10px 24px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
        }

        .btn-outline:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            background: rgba(212, 168, 83, 0.05);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-gold) 0%, #b8941d 100%);
            color: #0a0a0f;
            font-weight: 600;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px var(--shadow-gold);
        }

        .btn-small {
            padding: 8px 20px;
            font-size: 13px;
        }

        /* 用户菜单 */
        .user-menu {
            position: relative;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-gold) 0%, #b8941d 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 600;
            color: #0a0a0f;
            transition: all 0.3s ease;
        }

        .user-avatar:hover {
            box-shadow: 0 0 20px var(--shadow-gold);
        }

        .dropdown-menu {
            position: absolute;
            top: 55px;
            right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 10px 0;
            min-width: 180px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .dropdown-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-menu a {
            display: block;
            padding: 12px 20px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .dropdown-menu a:hover {
            background: var(--bg-glass);
            color: var(--text-primary);
        }

        .dropdown-divider {
            height: 1px;
            background: var(--border-subtle);
            margin: 8px 0;
        }

        /* 主内容区 */
        .main-content {
            padding-top: 100px;
            min-height: 100vh;
        }

        /* 页面头部 */
        .page-header {
            background: linear-gradient(180deg, rgba(212, 168, 83, 0.1) 0%, transparent 100%);
            padding: 60px 5%;
            border-bottom: 1px solid var(--border-subtle);
        }

        .page-header-content {
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 600;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #ffffff 0%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 18px;
        }

        /* 搜索和筛选区 */
        .filter-section {
            padding: 30px 5%;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-subtle);
        }

        .filter-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 500px;
        }

        .search-box input {
            width: 100%;
            background: var(--bg-glass);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 14px 50px 14px 20px;
            color: var(--text-primary);
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--border-glow);
            box-shadow: 0 0 20px var(--shadow-gold);
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        .search-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--accent-gold);
            border: none;
            color: #0a0a0f;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .search-btn:hover {
            background: var(--accent-gold-hover);
            transform: translateY(-50%) scale(1.05);
        }

        .filter-tags {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-tag {
            padding: 10px 20px;
            background: var(--bg-glass);
            border: 1px solid var(--border-subtle);
            border-radius: 25px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-tag:hover,
        .filter-tag.active {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            background: rgba(212, 168, 83, 0.1);
        }

        /* 电影网格 */
        .movies-section {
            padding: 60px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .movie-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.4s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .movie-card:hover {
            transform: translateY(-10px);
            border-color: var(--border-glow);
            box-shadow:
                0 30px 60px rgba(0, 0, 0, 0.4),
                0 0 30px var(--shadow-gold);
        }

        .movie-poster {
            position: relative;
            overflow: hidden;
        }

        .movie-poster img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .movie-card:hover .movie-poster img {
            transform: scale(1.05);
        }

        .movie-rating {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid var(--border-glow);
            padding: 8px 14px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 600;
            color: var(--accent-gold);
            font-size: 14px;
            backdrop-filter: blur(10px);
        }

        .movie-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(10, 10, 15, 0.95) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 25px;
        }

        .movie-card:hover .movie-overlay {
            opacity: 1;
        }

        .movie-description {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .movie-btn {
            background: linear-gradient(135deg, var(--accent-gold) 0%, #b8941d 100%);
            color: #0a0a0f;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .movie-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px var(--shadow-gold);
        }

        .movie-info {
            padding: 24px;
        }

        .movie-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-muted);
            font-size: 13px;
        }

        .movie-genre {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .genre-tag {
            padding: 4px 10px;
            background: var(--bg-glass);
            border-radius: 12px;
            font-size: 12px;
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 60px;
        }

        .page-btn {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            background: var(--bg-glass);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-btn:hover,
        .page-btn.active {
            background: var(--accent-gold);
            color: #0a0a0f;
            border-color: var(--accent-gold);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 100px 20px;
        }

        .empty-state-icon {
            font-size: 80px;
            margin-bottom: 30px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: 16px;
        }

        /* 页脚 */
        .footer {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-subtle);
            padding: 40px 5%;
            margin-top: 80px;
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--accent-gold);
        }

        .footer-logo span {
            color: var(--text-primary);
        }

        .footer-links {
            display: flex;
            gap: 30px;
        }

        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: var(--accent-gold);
        }

        .footer-copyright {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .nav-links {
                display: none;
            }

            .page-title {
                font-size: 36px;
            }

            .movies-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .page-header {
                padding: 40px 5%;
            }

            .page-title {
                font-size: 28px;
            }

            .filter-content {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box {
                max-width: 100%;
            }

            .movies-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 20px;
            }

            .movie-poster img {
                height: 240px;
            }

            .footer-content {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }

            .footer-links {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">Cuit<span>影评</span></a>
            <div class="nav-links">
                <a href="/">首页</a>
                <a href="/movielist" class="active">电影</a>
                <a href="/reviews">评论</a>
                <a href="#">社区</a>
            </div>
            <div class="nav-actions">
                <div class="user-menu">
                    <div class="user-avatar" onclick="toggleDropdown()" th:text="${user.username.substring(0,1).toUpperCase()}">U</div>
                    <div class="dropdown-menu" id="userDropdown">
                        <a th:href="@{/movielist(userId=${user.userId})}">电影列表</a>
                        <a th:href="@{/reviews(userId=${user.userId})}">评论列表</a>
                        <div class="dropdown-divider"></div>
                        <a href="/logout">退出登录</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
        <!-- 页面头部 -->
        <div class="page-header">
            <div class="page-header-content">
                <h1 class="page-title">电影列表</h1>
                <p class="page-subtitle">发现精选好电影，探索无限可能</p>
            </div>
        </div>

        <!-- 搜索和筛选 -->
        <div class="filter-section">
            <div class="filter-content">
                <form class="search-box" th:action="@{/search(userId=${user.userId})}" method="post">
                    <input type="text" name="title" placeholder="搜索电影名称、导演、演员...">
                    <button type="submit" class="search-btn">🔍</button>
                </form>
                <div class="filter-tags">
                    <span class="filter-tag active">全部</span>
                    <span class="filter-tag">剧情</span>
                    <span class="filter-tag">科幻</span>
                    <span class="filter-tag">动作</span>
                    <span class="filter-tag">爱情</span>
                    <span class="filter-tag">悬疑</span>
                </div>
            </div>
        </div>

        <!-- 电影列表 -->
        <section class="movies-section">
            <div class="movies-grid" th:if="${movies != null and !movies.isEmpty()}">
                <a class="movie-card" th:each="movie : ${movies}" th:href="@{/getmovie(movieId=${movie.movieId},userId=${user.userId})}">
                    <div class="movie-poster">
                        <img th:src="${movie.posterImage}" th:alt="${movie.title}">
                        <div class="movie-rating">
                            <span>★</span>
                            <span th:text="${movie.averageScore}">9.0</span>
                        </div>
                        <div class="movie-overlay">
                            <p class="movie-description" th:text="${movie.description}">电影简介...</p>
                            <div class="movie-btn">查看详情</div>
                        </div>
                    </div>
                    <div class="movie-info">
                        <h3 class="movie-title" th:text="${movie.title}">电影标题</h3>
                        <div class="movie-meta">
                            <span th:text="${movie.releaseDate + ' · ' + movie.runtime + '分钟'}">2024 · 120分钟</span>
                        </div>
                    </div>
                </a>
            </div>

            <!-- 空状态 -->
            <div class="empty-state" th:if="${movies == null or movies.isEmpty()}">
                <div class="empty-state-icon">🎬</div>
                <h3>暂无电影</h3>
                <p>暂无符合条件的电影，试试其他搜索条件</p>
            </div>

            <!-- 分页 -->
            <div class="pagination" th:if="${movies != null and !movies.isEmpty()}">
                <button class="page-btn">←</button>
                <button class="page-btn active">1</button>
                <button class="page-btn">2</button>
                <button class="page-btn">3</button>
                <span style="color: var(--text-muted); padding: 10px;">...</span>
                <button class="page-btn">10</button>
                <button class="page-btn">→</button>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-logo">Cuit<span>影评</span></div>
            <div class="footer-links">
                <a href="/">首页</a>
                <a href="/movielist">电影</a>
                <a href="/reviews">评论</a>
                <a href="#">关于</a>
            </div>
            <div class="footer-copyright">© 2024 Cuit影评. All rights reserved.</div>
        </div>
    </footer>

    <script>
        function toggleDropdown() {
            document.getElementById('userDropdown').classList.toggle('active');
        }

        document.addEventListener('click', function(e) {
            const userMenu = document.querySelector('.user-menu');
            if (!userMenu.contains(e.target)) {
                document.getElementById('userDropdown').classList.remove('active');
            }
        });

        // 筛选标签切换
        document.querySelectorAll('.filter-tag').forEach(tag => {
            tag.addEventListener('click', function() {
                document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
