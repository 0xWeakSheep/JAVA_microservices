server:
  port: 3000

spring:
  application:
    name: movies-gateway
  cloud:
    gateway:
      routes:
        - id: movies-api
          uri: http://localhost:3001
          predicates:
            - Path=/api/**
        - id: movies-frontend
          uri: http://localhost:3002
          predicates:
            - Path=/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
