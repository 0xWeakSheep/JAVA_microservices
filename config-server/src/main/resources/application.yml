server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          # 使用本地 Git 仓库路径
          uri: file://${user.home}/.config-repo
          # 默认分支
          default-label: master
          # 搜索路径
          search-paths: '{application}'
          # 刷新间隔
          refresh-rate: 5

# Eureka Client 配置
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
