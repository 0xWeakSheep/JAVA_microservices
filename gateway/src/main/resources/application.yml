server:
  port: 9501

spring:
  application:
    name: zuul-gateway

# Zuul 路由配置
zuul:
  routes:
    # 部门服务路由
    dept-service:
      path: /dept/**
      serviceId: dept-service
      strip-prefix: false
    # 电影服务路由
    movies-service:
      path: /api/**
      serviceId: movies-service
    # 前端服务路由
    frontend:
      path: /**
      url: http://localhost:3002
  # 启用饥饿加载，加快首次访问速度
  ribbon:
    eager-load:
      enabled: true
  # 敏感头信息设置，允许传递Authorization等头
  sensitive-headers:

# Eureka Client 配置
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health,info,routes, filters
