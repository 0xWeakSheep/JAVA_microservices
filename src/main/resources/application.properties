spring.application.name=movies-service
spring.config.import=optional:file:.env[.properties]
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/polymarket_db}
server.port=3001
app.auth.jwt-secret=${JWT_SECRET:movies-jwt-secret-key-change-this-in-production-2026}
app.auth.jwt-expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Eureka Client 配置
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=10
