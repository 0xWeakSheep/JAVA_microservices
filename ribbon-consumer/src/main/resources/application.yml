server:
  port: 9001

spring:
  application:
    name: ribbon-consumer

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Ribbon配置
dept-service-provider:
  ribbon:
    # 负载均衡策略：轮询
    NFLoadBalancerRuleClassName: com.netflix.loadbalancer.RoundRobinRule
    # 连接超时
    ConnectTimeout: 1000
    # 读取超时
    ReadTimeout: 3000
